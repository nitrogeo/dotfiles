# ############### scrolling layout! #############################################
# 3.9.2026
# Switch between Dwindle and Scrolling layouts
bind = $mainMod, T, exec, ~/.config/hypr/hypr-scripts/toggle-layout.sh

# Scrolling-specific navigation - gemini/gemini overview i think haha
## bind = $mainMod, period, layoutmsg, focus right
## bind = $mainMod, comma, layoutmsg, focus left
## bind = $mainMod, R, layoutmsg, cycleactive # Cycle through preset window sizes





# Master layout
## bind = $mainMod, M, layoutmsg, addmaster
## bind = $mainMod SHIFT, M, layoutmsg, removemaster
## bind = $mainMod, H, layoutmsg, mfact -0.05
## bind = $mainMod, L, layoutmsg, mfact +0.05

# Scrolling layaut ##############################################
# move the view by columns
# binde = $mainMod, slash, layoutmsg, move +col
# binde = $mainMod, comma, layoutmsg, move -col
binde = $mainMod, slash, layoutmsg, focus r
binde = $mainMod, comma, layoutmsg, focus l

# move windows between columns / directions (promotes to new column at right edge)
bind = $mainMod SHIFT, slash,  layoutmsg, swapcol r
bind = $mainMod SHIFT, comma,  layoutmsg, swapcol l
# bind = $mainMod SHIFT, slash,  layoutmsg, movewindowto r
# bind = $mainMod SHIFT, comma,  layoutmsg, movewindowto l
## bind = $mainMod SHIFT, up,     layoutmsg, movewindowto u
## bind = $mainMod SHIFT, down,   layoutmsg, movewindowto d


# resize current column
bind = $mainMod, equal,        layoutmsg, colresize +0.1
bind = $mainMod, minus,        layoutmsg, colresize -0.1
## bind = $mainMod, c,         layoutmsg, colresize +conf      # cycle to next preset width
## bind = $mainMod, x,         layoutmsg, colresize -conf      # cycle backward
bind = $mainMod SHIFT, equal,  layoutmsg, colresize +conf      # cycle to next preset width
bind = $mainMod SHIFT, minus,  layoutmsg, colresize -conf      # cycle backward

# custom: add granular tape movement
bind = $mainMod, bracketright, layoutmsg, move +200
bind = $mainMod, bracketleft,  layoutmsg, move -200



# column management - (mostly) REDUNANT AND USELESS
bind = $mainMod, apostrophe, layoutmsg, colresize 1
bind = $mainMod SHIFT, F, layoutmsg, colresize 1

bind = $mainMod SHIFT, apostrophe, layoutmsg, promote                  # put focused window in a new column
bind = $mainMod, G, layoutmsg, togglefit             # toggle center vs fit - idk if works with built-in hyprland scrolling
# bind = $mainMod, apostrophe, layoutmsg, swapcol r                # swap this column to the right
# bind = $mainMod, semicolon, layoutmsg, swapcol l                # swap to the left


# Toggle scrolling follow focus
bind = $mainMod SHIFT CTRL, F, exec, ~/.config/hypr/hypr-scripts/toggle-scrolling-focus.sh