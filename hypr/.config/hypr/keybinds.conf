# OLD (but working)
# Alt + Shift + S: Snip with box (Freezes screen)
# bind = ALT_SHIFT, S, exec, grimblast --freeze copysave area $ss_dir/$ss_name && $notify
bind = ALT_SHIFT, S, exec, grimblast --freeze copysave area $ss_dir/$ss_name && $notify-snip && $unfreeze

# Ctrl + Print: Focused Window
# bind = CONTROL, Print, exec, grimblast --freeze copysave active $ss_dir/$ss_name && $notify
bind = CONTROL, Print, exec, grimblast --freeze copysave active $ss_dir/$ss_name && $notify-window && $unfreeze

# Shift + Print: All monitors
# bind = SHIFT, Print, exec, grimblast --freeze copysave screen $ss_dir/$ss_name && $notify
bind = SHIFT, Print, exec, grimblast --freeze copysave screen $ss_dir/$ss_name && $notify-allmon && $unfreeze

# Alt + Print: Current monitor only
# bind = ALT, Print, exec, grimblast --freeze copysave output $ss_dir/$ss_name && $notify
bind = ALT, Print, exec, grimblast --freeze copysave output $ss_dir/$ss_name && $notify-curmon && $unfreeze


# Force kill everything if the screen gets stuck
bind = CTRL_ALT, Delete, exec, pkill -9 hyprpicker || pkill -9 slurp || pkill -9 still



# OCR
$OCR4Linux_ENG = ~/.config/OCR4Linux/OCR4Linux.sh --lang eng -d ~/Pictures/Screenshots/ocr-screenshots
$OCR4Linux = ~/.config/OCR4Linux/OCR4Linux.sh -d ~/Pictures/Screenshots/ocr-screenshots


bind = $mainMod SHIFT, T, exec, $OCR4Linux_ENG # OCR4Linux with English only
bind = $mainMod SHIFT, E, exec, $OCR4Linux # OCR4Linux with interactive selection












# ###################### misc custom ############################################

# Toggle $menu with Super+R (name must match $menu)
## bind = $mainMod, R, exec, pkill rofi || $menu

# Toggle $menu with Alt+Space (name must match $menu)
bind = ALT, SPACE, exec, pkill rofi || $menu

# Toggle wofi with Ctrl+Space
bind = CTRL, SPACE, exec, pkill wofi || wofi --show drun

# temrinal with super + enter
bind = $mainMod, RETURN, exec, $terminal


# Alt + Q (or any key) to toggle media
bind = ALT, Q, exec, playerctl play-pause
# alt r to skip
bind = ALT, R, exec, playerctl next
# 3.26.2026 - alt d to go back (? testing out)
bind = ALT, D, exec, playerctl previous


# Move window with mainMod + LMB (Left Mouse Button)
bindm = $mainMod, mouse:272, movewindow

# Resize window with mainMod + RMB (Right Mouse Button)
bindm = $mainMod, mouse:273, resizewindow

# lock lol
bind = $mainMod, L, exec, hyprlock


# clipboard manager
# bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
# new 3.25.2026 add image previews
## bind = $mainMod, V, exec, /home/nitro/scripts/cliphist-img-previews.sh | cliphist list | rofi -dmenu | cliphist decode | wl-copy
# format help: bind = SUPER, V, exec, path/to/script | rofi -dmenu -display-columns 2 | wl-copy
# The script already calls 'cliphist list' internally, so it should be the start of the pipe
bind = $mainMod, V, exec, /home/nitro/scripts/cliphist-img-previews.sh | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy


# hyprspace lol
## bind = $mainMod, SHIFT (or CONTROL), TAB, overview:toggle
bind = $mainMod, TAB, exec, rofi -show window

# Toggle trackpad
bind = SUPER CONTROL, T, exec, ~/scripts/toggle-trackpad.sh

# dock
bind = $mainMod SHIFT, D, exec, killall nwg-dock-hyprland || nwg-dock-hyprldand -d
## bind = $mainMod SHIFT, D, exec, pkill -f nwg-dock-hyprland; sleep 0.5; nwg-dock-hyprland -d -x -mb 10 -p bottom -i 25
## bind = $mainMod SHIFT, D, exec, nwg-dock-hyprland

bind = $mainMod SHIFT, R, exec, hyprctl reload


# Brightness control
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Bluetooth Menu (bzmenu)
bind = $mainMod, B, exec, bzmenu -l rofi


bind = $mainMod CONTROL, 1, moveworkspacetomonitor, 1
bind = $mainMod CONTROL, 2, moveworkspacetomonitor, 2


# waybar reload
bind = $mainMod, R, exec, ~/.config/waybar/scripts/nitrolaunch.sh


# emoji picker
bind = SUPER, period, exec, pkill smile || smile


# Sublime Text
bind = SUPER, C, exec, pkill subl || subl

# Zed - 3.13.2026
bind = SUPER SHIFT, Z, exec, pkill zeditor || zeditor


# fullscreen
bind = ALT, F, fullscreen, 0


# toggle default window mode behavior
