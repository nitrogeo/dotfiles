# New, Stable Screenshot Logic (Requires: still, grim, slurp, wl-clipboard)
# Variables
$ss_dir = ~/Pictures/Screenshots/hypr-screenshots
# Formats as: Screenshot_20260207_085627.png
$ss_name = Screenshot_$(date +'%Y%m%d_%H%M%S').png
$notify = notify-send "Screenshot Captured" "Saved and copied to clipboard" -i camera-photo
$notify-snip = notify-send "Snip Captured" "Saved and copied to clipboard" -i camera-photo
$notify-window = notify-send "Window Captured" "Saved and copied to clipboard" -i camera-photo
$notify-allmon = notify-send "All Monitors Captured" "Saved and copied to clipboard" -i camera-photo
$notify-curmon = notify-send "Current Monitor Captured" "Saved and copied to clipboard" -i camera-photo
# Explicitly kill hyprpicker to unfreeze screen (prevents stuck freeze)
# $unfreeze = pkill hyprpicker
$unfreeze = pkill -9 hyprpicker z|| pkill -9 slurp || pkill -9 still


