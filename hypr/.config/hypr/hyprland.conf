################
### MONITORS ### ####################################################################################################
################

# See https://wiki.hypr.land/Configuring/Monitors/

# syntax from wiki: 
# monitor = name, resolution, position, scale

# 3.30.2026 - kanshi handles monitors now

# monitor = HDMI-A-1, 1920x1080@74.97, 0x0, 1
##### monitor = DP-1, 1920x1080@60, 0x0, 1
# monitor = eDP-1, 1366x768@60, 1920x312, 0.8
# Use 1360 instead of 1366 to allow 0.8 scaling
# 1360 / 0.8 = 1700 (Integer!)
# 768 / 0.8 = 960 (Integer!)
##### monitor = eDP-1, 1360x768@60, 1920x312, 1
# monitor = eDP-1, 1600x900@60, 1920x312, 0.8


# 3.29.2026 yet another monitor lool
# monitor = HDMI-A-1, 1920x1080@60, 1360x312, 1
# 1. Laptop on the Left (The anchor)
##### monitor = eDP-1, 1360x768@60, 0x312, 1

# 2. Acer on the Right (Starts after the laptop's 1360 width)
# I'm using HDMI-A-1; if it doesn't turn on, try 'hyprctl monitors' to check the name
##### monitor = HDMI-A-1, 1920x1080@60, 1366x0, 1




xwayland {
  force_zero_scaling = true
}



###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
// $menu = wofi --show drun
$menu = rofi -show drun
# $menu = ~/.config/rofi/launchers/type-4/launcher.sh


#################
### AUTOSTART ### ####################################################################################################
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox


exec-once = /usr/lib/pam_kwallet_init
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# exec-once = hyprpaper
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = rclone-manager

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store // storpo
# Trim cliphist to the last 200 items on startup
exec-once = cliphist list | head -n 200 | cliphist delete-query ""


exec-once = nwg-dock-hyprland -d -x -mb 10 -p bottom -i 25
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload -n

# 3.15.2026
exec-once = gnome-keyring-daemon --start --components=secrets

# 3.29.2026
exec-once = rfkill unblock all


# THEMING

# exec-once = swww img /home/nitro/Pictures/wallpapers/minimal/02-blue-teal.png
# exec-once = swww img /home/nitro/Pictures/wallpapers/apple/Sonoma Wallpaper 1.png
exec-once = swww img '/home/nitro/Pictures/synced-wallpapers/Sonoma Wallpaper 1.png'

# preload = ~/Pictures/wallpapers/minimal/02-blue-teal.png
# wallpaper = HDMI-A-1, ~/Pictures/wallpapers/minimal/02-blue-teal.png
# wallpaper = eDP-1, ~/Pictures/wallpapers/minimal/02-blue-teal.png
# e.g., wallpaper = eDP-1,~/Pictures/wallpaper.png


exec-once = hyprctl setcursor macOS 24

exec-once = gsettings set org.gnome.desktop.interface text-scaling-factor 1


