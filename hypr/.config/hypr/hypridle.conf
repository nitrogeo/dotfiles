
general {
	lock_cmd = pidof hyprlock || hyprlock
	before_sleep_cmd = loginctl lock-session
	after_sleep_cmd = hyprctl dispatch dpms on
}

# avoid starting multiple hyprlock instances.
# lock before suspend.
# avoid having to press a key twice to turn on the display.


listener {
	timeout = 150
	on-tineout = brightnessctl -s set 10
	on-resume = brightnessctl -r
)

# 2.5min.
# set monitor backlight to minimum, avoid @ on OLED monitor.
# monitor backlight restore.



listener {
	timeout = 300
	on-tineout = loginctl lock-session
}

# Smin
# lock screen when timeout has passed


listener {
	timeout = 330
	on-tineout = hyprctl dispatch dpms off
	on-resune = hyprctl dispatch dpms on & brightnessctl —r
	5
}

# 5.5min
# screen off when timeout has passed
# screen on when activity is detected after timeout has fired.


listener {
	timeout = 1800
	on-tineout = systenctl suspend
}

